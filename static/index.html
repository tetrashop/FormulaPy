<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormulaPy — پیشرفته‌ترین ماشین حساب ریاضیات نمادین</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(145deg, #f8fafc 0%, #eef2f8 100%); min-height: 100vh; }
        .latex-output { background: #fefce8; padding: 1rem; border-radius: 1rem; font-size: 1.2rem; text-align: center; overflow-x: auto; }
        .tab-active { background: white; color: #1e293b; border-bottom: 3px solid #3b82f6; font-weight: 600; }
        .tab-inactive { background: #f1f5f9; color: #475569; border-bottom: 1px solid #cbd5e1; }
        .btn-primary { background: #1e293b; transition: 0.2s; }
        .btn-primary:hover { background: #0f172a; transform: scale(1.02); }
        textarea, input, select { transition: 0.15s; }
        textarea:focus, input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    </style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-6xl mx-auto">
    <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 bg-white/70 rounded-full px-4 py-1 shadow-sm mb-2">
            <span class="text-indigo-600 text-xl">∫</span>
            <span class="text-sm font-mono text-slate-600">FormulaPy v3.0</span>
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-slate-800 to-indigo-800 bg-clip-text text-transparent">موتور انتگرال‌گیری هوشمند</h1>
        <p class="text-slate-500 mt-2">انتگرال، مشتق، حد، سری، ساده‌سازی، بسط — با قدرت SymPy</p>
    </div>

    <!-- تب‌ها -->
    <div class="flex flex-wrap gap-2 border-b border-slate-200 mb-6">
        <button data-tab="integral" class="tab-active px-5 py-2.5 rounded-t-xl text-sm font-medium">🧮 انتگرال</button>
        <button data-tab="derivative" class="tab-inactive px-5 py-2.5 rounded-t-xl text-sm font-medium">📈 مشتق</button>
        <button data-tab="limit" class="tab-inactive px-5 py-2.5 rounded-t-xl text-sm font-medium">➿ حد</button>
        <button data-tab="series" class="tab-inactive px-5 py-2.5 rounded-t-xl text-sm font-medium">🔍 سری</button>
        <button data-tab="simplify" class="tab-inactive px-5 py-2.5 rounded-t-xl text-sm font-medium">✨ ساده‌سازی</button>
        <button data-tab="expand" class="tab-inactive px-5 py-2.5 rounded-t-xl text-sm font-medium">🧩 بسط</button>
    </div>

    <!-- پنل انتگرال -->
    <div id="integralPanel" class="tab-panel bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-6 card-hover">
        <div class="flex flex-wrap gap-4 items-center justify-between border-b pb-3 mb-4">
            <h2 class="text-xl font-semibold">∫ انتگرال</h2>
            <div class="flex gap-3 bg-slate-100 p-1 rounded-xl">
                <button id="indefiniteBtn" class="px-4 py-1.5 rounded-lg text-sm font-medium bg-white shadow-sm text-indigo-700">نامعین</button>
                <button id="definiteBtn" class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600">معین</button>
            </div>
        </div>
        <div id="indefiniteForm" class="space-y-4">
            <div><label class="block font-semibold mb-1">عبارت f(x) :</label><textarea id="intExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">x**2 + sin(x)</textarea></div>
            <div><label class="block font-semibold mb-1">متغیر :</label><input id="intVar" value="x" class="w-32 border rounded-xl p-2"></div>
            <button id="computeIndefinite" class="btn-primary w-full md:w-auto px-8 py-3 rounded-xl text-white font-semibold">محاسبه ∫</button>
        </div>
        <div id="definiteForm" class="space-y-4 hidden">
            <div><label class="block font-semibold mb-1">عبارت f(x) :</label><textarea id="defExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">exp(-x**2)</textarea></div>
            <div class="grid grid-cols-2 gap-4"><div><label>حد پایین (a) :</label><input id="lowerBound" type="number" value="0" step="any" class="w-full border rounded-xl p-2"></div>
            <div><label>حد بالا (b) :</label><input id="upperBound" type="number" value="1" step="any" class="w-full border rounded-xl p-2"></div></div>
            <div><label>متغیر :</label><input id="defVar" value="x" class="w-32 border rounded-xl p-2"></div>
            <div><label><input type="checkbox" id="numericFallback" checked> در صورت نیاز روش عددی</label></div>
            <button id="computeDefinite" class="btn-primary w-full md:w-auto px-8 py-3 rounded-xl text-white font-semibold">محاسبه ∫ معین</button>
        </div>
    </div>

    <!-- پنل مشتق -->
    <div id="derivativePanel" class="tab-panel hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-6 space-y-4">
        <h2 class="text-xl font-semibold">📈 مشتق</h2>
        <div><label class="block font-semibold">عبارت :</label><textarea id="derivExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">x**3 * sin(x)</textarea></div>
        <div class="grid grid-cols-2 gap-4"><div><label>متغیر :</label><input id="derivVar" value="x" class="border rounded-xl p-2"></div>
        <div><label>مرتبه :</label><input id="orderDeriv" type="number" value="1" step="1" class="border rounded-xl p-2"></div></div>
        <button id="computeDeriv" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold">محاسبه مشتق</button>
    </div>

    <!-- پنل حد -->
    <div id="limitPanel" class="tab-panel hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-6 space-y-4">
        <h2 class="text-xl font-semibold">➿ حد</h2>
        <div><label class="block font-semibold">عبارت :</label><textarea id="limitExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">sin(x)/x</textarea></div>
        <div class="grid grid-cols-3 gap-3"><div><label>متغیر :</label><input id="limitVar" value="x" class="border rounded-xl p-2"></div>
        <div><label>نقطه :</label><input id="limitPoint" type="number" value="0" step="any" class="border rounded-xl p-2"></div>
        <div><label>جهت :</label><select id="limitDir" class="border rounded-xl p-2"><option value="+">راست</option><option value="-">چپ</option><option value="+-">دو طرفه</option></select></div></div>
        <button id="computeLimit" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold">محاسبه حد</button>
    </div>

    <!-- پنل سری -->
    <div id="seriesPanel" class="tab-panel hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-6 space-y-4">
        <h2 class="text-xl font-semibold">🔍 بسط سری</h2>
        <div><label class="block font-semibold">عبارت :</label><textarea id="seriesExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">exp(x)</textarea></div>
        <div class="grid grid-cols-2 gap-4"><div><label>متغیر :</label><input id="seriesVar" value="x" class="border rounded-xl p-2"></div>
        <div><label>نقطه :</label><input id="seriesPoint" type="number" value="0" step="any" class="border rounded-xl p-2"></div>
        <div><label>مرتبه :</label><input id="seriesOrder" type="number" value="5" step="1" class="border rounded-xl p-2"></div></div>
        <button id="computeSeries" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold">محاسبه سری</button>
    </div>

    <!-- پنل ساده‌سازی -->
    <div id="simplifyPanel" class="tab-panel hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-6 space-y-4">
        <h2 class="text-xl font-semibold">✨ ساده‌سازی</h2>
        <div><label class="block font-semibold">عبارت :</label><textarea id="simpExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">sin(x)**2 + cos(x)**2</textarea></div>
        <div><label>متغیر :</label><input id="simpVar" value="x" class="w-32 border rounded-xl p-2"></div>
        <button id="computeSimplify" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold">ساده‌سازی</button>
    </div>

    <!-- پنل بسط -->
    <div id="expandPanel" class="tab-panel hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-6 space-y-4">
        <h2 class="text-xl font-semibold">🧩 بسط جبری</h2>
        <div><label class="block font-semibold">عبارت :</label><textarea id="expandExpr" rows="2" class="w-full border rounded-xl p-3 font-mono">(x + 1)**3</textarea></div>
        <div><label>متغیر :</label><input id="expandVar" value="x" class="w-32 border rounded-xl p-2"></div>
        <button id="computeExpand" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold">بسط دادن</button>
    </div>

    <!-- بخش نتیجه -->
    <div class="mt-8">
        <div id="resultCard" class="bg-white rounded-2xl shadow-lg p-5 hidden transition-all">
            <div class="flex items-center gap-2 text-emerald-700 mb-2"><span class="text-xl">✅</span><span class="font-bold">نتیجه</span></div>
            <div id="latexResult" class="latex-output"></div>
            <div id="plainResult" class="mt-3 text-sm font-mono text-slate-600 bg-slate-50 p-3 rounded-xl"></div>
        </div>
        <div id="errorCard" class="bg-red-50 border-r-4 border-red-500 rounded-2xl p-5 hidden">
            <div class="flex items-center gap-2 text-red-700"><span>⚠️</span><span class="font-bold">خطا</span></div>
            <div id="errorMsg" class="text-sm text-red-800 mt-1 font-mono"></div>
        </div>
    </div>

    <!-- مثال‌ها -->
    <div class="mt-8 flex flex-wrap gap-2 justify-center">
        <button class="exampleBtn text-xs bg-slate-200 hover:bg-slate-300 rounded-full px-4 py-2" data-expr="x**2 + 3*x + 5">x²+3x+5</button>
        <button class="exampleBtn text-xs bg-slate-200 hover:bg-slate-300 rounded-full px-4 py-2" data-expr="sin(x)">sin(x)</button>
        <button class="exampleBtn text-xs bg-slate-200 hover:bg-slate-300 rounded-full px-4 py-2" data-expr="exp(x)">eˣ</button>
        <button class="exampleBtn text-xs bg-slate-200 hover:bg-slate-300 rounded-full px-4 py-2" data-expr="1/x">1/x</button>
        <button class="exampleBtn text-xs bg-slate-200 hover:bg-slate-300 rounded-full px-4 py-2" data-expr="x**2 * sin(x)">x² sin(x)</button>
    </div>
    <p class="text-center text-xs text-slate-400 mt-6">✨ SymPy + FastAPI | استقرار روی Vercel</p>
</div>

<script>
    const API_BASE = '/api';
    let activeTab = 'integral';
    let integralMode = 'indefinite';

    // مدیریت تب‌ها
    function switchTab(tabId) {
        activeTab = tabId;
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.add('hidden'));
        document.getElementById(`${tabId}Panel`).classList.remove('hidden');
        document.querySelectorAll('[data-tab]').forEach(btn => {
            if(btn.dataset.tab === tabId) {
                btn.classList.remove('tab-inactive');
                btn.classList.add('tab-active');
            } else {
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            }
        });
        if(tabId === 'integral') syncIntegralForms();
    }

    function syncIntegralForms() {
        const indefForm = document.getElementById('indefiniteForm');
        const defForm = document.getElementById('definiteForm');
        const indefBtn = document.getElementById('indefiniteBtn');
        const defBtn = document.getElementById('definiteBtn');
        if(integralMode === 'indefinite') {
            indefForm.classList.remove('hidden');
            defForm.classList.add('hidden');
            indefBtn.classList.add('bg-white','shadow-sm','text-indigo-700');
            defBtn.classList.remove('bg-white','shadow-sm','text-indigo-700');
        } else {
            indefForm.classList.add('hidden');
            defForm.classList.remove('hidden');
            defBtn.classList.add('bg-white','shadow-sm','text-indigo-700');
            indefBtn.classList.remove('bg-white','shadow-sm','text-indigo-700');
        }
    }

    document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    document.getElementById('indefiniteBtn').addEventListener('click', () => { integralMode = 'indefinite'; syncIntegralForms(); });
    document.getElementById('definiteBtn').addEventListener('click', () => { integralMode = 'definite'; syncIntegralForms(); });
    syncIntegralForms();

    async function callAPI(endpoint, payload) {
        const res = await fetch(`${API_BASE}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if(data.success === false) throw new Error(data.error || 'خطای محاسباتی');
        return data;
    }

    function showResult(latex, plain) {
        document.getElementById('errorCard').classList.add('hidden');
        const resultCard = document.getElementById('resultCard');
        document.getElementById('latexResult').innerHTML = `\\[${latex}\\]`;
        document.getElementById('plainResult').innerText = plain;
        resultCard.classList.remove('hidden');
        if(window.MathJax) MathJax.typesetPromise();
    }

    function showError(msg) {
        document.getElementById('resultCard').classList.add('hidden');
        const errorCard = document.getElementById('errorCard');
        document.getElementById('errorMsg').innerText = msg;
        errorCard.classList.remove('hidden');
    }

    // انتگرال نامعین
    document.getElementById('computeIndefinite').addEventListener('click', async () => {
        const expr = document.getElementById('intExpr').value.trim();
        const varName = document.getElementById('intVar').value.trim();
        if(!expr) return showError('عبارت را وارد کنید');
        try {
            const data = await callAPI('/integrate', { expression: expr, variable: varName });
            showResult(data.latex, `${data.result} + C`);
        } catch(e) { showError(e.message); }
    });

    // انتگرال معین
    document.getElementById('computeDefinite').addEventListener('click', async () => {
        const expr = document.getElementById('defExpr').value.trim();
        const varName = document.getElementById('defVar').value.trim();
        const a = parseFloat(document.getElementById('lowerBound').value);
        const b = parseFloat(document.getElementById('upperBound').value);
        if(!expr || isNaN(a) || isNaN(b)) return showError('مقادیر معتبر وارد کنید');
        try {
            const data = await callAPI('/integrate', { expression: expr, variable: varName, lower_bound: a, upper_bound: b });
            showResult(data.latex, `${data.result}`);
        } catch(e) { showError(e.message); }
    });

    // مشتق
    document.getElementById('computeDeriv').addEventListener('click', async () => {
        const expr = document.getElementById('derivExpr').value.trim();
        const varName = document.getElementById('derivVar').value.trim();
        const order = parseInt(document.getElementById('orderDeriv').value) || 1;
        if(!expr) return showError('عبارت را وارد کنید');
        try {
            const data = await callAPI('/derivative', { expression: expr, variable: varName, order });
            showResult(data.latex, data.result);
        } catch(e) { showError(e.message); }
    });

    // حد
    document.getElementById('computeLimit').addEventListener('click', async () => {
        const expr = document.getElementById('limitExpr').value.trim();
        const varName = document.getElementById('limitVar').value.trim();
        const point = parseFloat(document.getElementById('limitPoint').value);
        const dir = document.getElementById('limitDir').value;
        if(!expr) return showError('عبارت را وارد کنید');
        try {
            const data = await callAPI('/limit', { expression: expr, variable: varName, point, direction: dir });
            showResult(data.latex, data.result);
        } catch(e) { showError(e.message); }
    });

    // سری
    document.getElementById('computeSeries').addEventListener('click', async () => {
        const expr = document.getElementById('seriesExpr').value.trim();
        const varName = document.getElementById('seriesVar').value.trim();
        const point = parseFloat(document.getElementById('seriesPoint').value);
        const order = parseInt(document.getElementById('seriesOrder').value) || 5;
        if(!expr) return showError('عبارت را وارد کنید');
        try {
            const data = await callAPI('/series', { expression: expr, variable: varName, point, order });
            showResult(data.latex, data.result);
        } catch(e) { showError(e.message); }
    });

    // ساده‌سازی
    document.getElementById('computeSimplify').addEventListener('click', async () => {
        const expr = document.getElementById('simpExpr').value.trim();
        const varName = document.getElementById('simpVar').value.trim();
        if(!expr) return showError('عبارت را وارد کنید');
        try {
            const data = await callAPI('/simplify', { expression: expr, variable: varName });
            showResult(data.latex, data.result);
        } catch(e) { showError(e.message); }
    });

    // بسط
    document.getElementById('computeExpand').addEventListener('click', async () => {
        const expr = document.getElementById('expandExpr').value.trim();
        const varName = document.getElementById('expandVar').value.trim();
        if(!expr) return showError('عبارت را وارد کنید');
        try {
            const data = await callAPI('/expand', { expression: expr, variable: varName });
            showResult(data.latex, data.result);
        } catch(e) { showError(e.message); }
    });

    // مثال‌ها
    document.querySelectorAll('.exampleBtn').forEach(btn => {
        btn.addEventListener('click', () => {
            const expr = btn.getAttribute('data-expr');
            if(activeTab === 'integral') {
                if(integralMode === 'indefinite') document.getElementById('intExpr').value = expr;
                else document.getElementById('defExpr').value = expr;
            } else if(activeTab === 'derivative') document.getElementById('derivExpr').value = expr;
            else if(activeTab === 'limit') document.getElementById('limitExpr').value = expr;
            else if(activeTab === 'series') document.getElementById('seriesExpr').value = expr;
            else if(activeTab === 'simplify') document.getElementById('simpExpr').value = expr;
            else if(activeTab === 'expand') document.getElementById('expandExpr').value = expr;
        });
    });
</script>
</body>
</html>
